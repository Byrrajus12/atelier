<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>atelier reference canvas</title>
<style>
  html, body { margin: 0; padding: 0; background: #808080; }
  #wrap { display: flex; gap: 24px; padding: 16px; align-items: flex-start; }

  /* The paintable canvas sits inside a padded frame. The corner fiducials are
     absolutely-positioned DOM elements living in that padding — OUTSIDE the
     <canvas> bitmap — so no stroke can ever overwrite them (a stroke cannot paint
     beyond the canvas element). Each fiducial's centroid sits a fixed 15 CSS px
     diagonally outside its canvas corner; canvas is 600 units == 600 CSS px, so the
     centroid lands at canvas coord -15 / 615, i.e. FIDUCIAL_INSET = -15.0 in
     browser_canvas.py. Frame = 33 pad + 600 canvas + 33 pad = 666 px. */
  #frame { position: relative; width: max-content; padding: 33px; }
  #board { display: block; background: #ffffff; touch-action: none; cursor: crosshair; }
  .fid { position: absolute; width: 18px; height: 18px; }
  #fid-tl { left: 9px;   top: 9px;   background: #ff00ff; } /* magenta  top-left     */
  #fid-tr { left: 639px; top: 9px;   background: #00ffff; } /* cyan     top-right    */
  #fid-bl { left: 9px;   top: 639px; background: #ffff00; } /* yellow   bottom-left  */
  #fid-br { left: 639px; top: 639px; background: #00ff00; } /* green    bottom-right */

  .palette { display: flex; flex-direction: column; gap: 10px; }
  .sw { width: 44px; height: 44px; border: 2px solid #000; box-sizing: border-box; }
</style>
</head>
<body>
<div id="wrap">
  <div id="frame">
    <canvas id="board" width="600" height="600"></canvas>
    <div class="fid" id="fid-tl"></div>
    <div class="fid" id="fid-tr"></div>
    <div class="fid" id="fid-bl"></div>
    <div class="fid" id="fid-br"></div>
  </div>
  <div class="palette" id="palette"></div>
  <div class="palette" id="widths"></div>
</div>
<script>
  // A dead-simple pointer-driven paint surface. The agent drives this ONLY through
  // real OS cursor input + screen capture — never through this JS. The corner
  // fiducials (pure locator colors, in the frame padding around the canvas) let the
  // Easel find the canvas region in a screenshot; being off-canvas, they survive any
  // stroke.
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');

  // White ground.
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Palette swatches (uniquely colored, so the Easel can locate one to click).
  const COLORS = ['#ff0000', '#0000ff', '#111111'];
  let current = '#ff0000';
  const pal = document.getElementById('palette');
  for (const c of COLORS) {
    const d = document.createElement('div');
    d.className = 'sw';
    d.style.background = c;
    d.dataset.color = c;
    d.addEventListener('pointerdown', (e) => { current = c; e.stopPropagation(); });
    pal.appendChild(d);
  }

  // Width buttons (locator-colored, so the Easel can locate one to click).
  const WIDTHS = [
    {name: 'thin', width: 4, color: '#ff8c00'},
    {name: 'medium', width: 12, color: '#8c00d2'},
    {name: 'thick', width: 24, color: '#009696'}
  ];
  let currentWidth = 12;
  const widths = document.getElementById('widths');
  for (const preset of WIDTHS) {
    const d = document.createElement('div');
    d.className = 'sw';
    d.style.background = preset.color;
    d.dataset.width = preset.width;
    d.addEventListener('pointerdown', (e) => { currentWidth = preset.width; e.stopPropagation(); });
    widths.appendChild(d);
  }

  // Freehand drawing. clientX/Y -> canvas-internal coords handles devicePixelRatio
  // and display scaling transparently (we never reason in CSS units here).
  let drawing = false, last = null;
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) * canvas.width / r.width,
      y: (e.clientY - r.top) * canvas.height / r.height
    };
  }
  canvas.addEventListener('pointerdown', (e) => {
    drawing = true; last = pos(e);
    ctx.strokeStyle = current; ctx.lineWidth = currentWidth; ctx.lineCap = 'butt'; ctx.lineJoin = 'round';
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!drawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    last = p;
  });
  window.addEventListener('pointerup', () => { drawing = false; last = null; });
</script>
</body>
</html>
